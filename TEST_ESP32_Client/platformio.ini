; PlatformIO Project Configuration File
;
[platformio]
default_envs = seeed_xiao_esp32c3

[env:seeed_xiao_esp32c3]
platform = espressif32 
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 460800
#upload_speed  = 115200
lib_extra_dirs = ../___MeLib

; Add one of the following lines for OTA partitions on ESP32
;board_build.partitions = default_ota.csv  ; Default with OTA support
;board_build.partitions = minimal_ota.csv  ; Minimal with OTA support (more space for sketch
;upload_protocol = espota
;upload_port  =  192.168.166.47       ; Either use the IP address:
                                    ; Or use the hostname (default is usually 'esp32-[chipID]')
                                    ; You can set a custom hostname in your code (see below)
                                    ; upload_port = your_device_hostname.local
